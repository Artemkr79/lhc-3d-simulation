<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LHC Pro: Ultimate 3D Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
    <div id="hud">
        <h1>CERN Terminal</h1>
        <div class="stat">Энергия: <span id="val-energy">7.0</span> TeV</div>
        <div class="stat">Сгустков: <span id="val-bunches">4</span></div>
        <div class="stat">Событий: <span id="val-collisions" style="color: #ffaa00;">0</span></div>
        
        <div class="controls">
            <label>ЭНЕРГИЯ ПУЧКА</label>
            <input type="range" id="slider-energy" min="1" max="14" step="0.5" value="7">
            <label>ПЛОТНОСТЬ ПУЧКА</label>
            <input type="range" id="slider-bunches" min="1" max="10" step="1" value="4">
        </div>
    </div>

    <div id="legend">
        <h3>МАРКИРОВКА СИСТЕМЫ</h3>
        <div class="legend-item"><span class="color-box" style="background: #ffff00; box-shadow: 0 0 8px #ffff00;"></span> Пучок A (По часовой)</div>
        <div class="legend-item"><span class="color-box" style="background: #00ffff; box-shadow: 0 0 8px #00ffff;"></span> Пучок B (Против часовой)</div>
        <div class="legend-item"><span class="color-box" style="background: #ffffff; box-shadow: 0 0 8px #ffffff;"></span> Продукты распада</div>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Детектор</h2>
        <p id="info-desc">Описание</p>
    </div>

    <div id="labels-container"></div>

    <div id="crosshair">ЛКМ - вращать | Колесико - зум | Клик на станцию - инфо</div>

    <script src="app.js"></script>
</body>
</html>
